<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="icon" type="image/png" href="../assets/IconDevConnect.png">
    <title>devConnect</title>
</head>

<body>

    <div class="formLogin">
        <div class="login-card">

            <div class="logo formLogo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                    class="main-grid-item-icon" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" stroke-width="2">
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                </svg>
                <h1><i class="fa-solid fa-code"></i> <span>dev</span>Connect</h1>
            </div>

            <p class="subtitle">Masuk dan mulai berbagi kode</p>

            <form>
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-box">
                        <i class="fa-solid fa-at"></i>
                        <input type="text" placeholder="Username" class="input-form" id="username">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" class="input-form">
                        <i class="fa-solid fa-eye password-eye"></i>
                    </div>
                </div>

                <div class="options">
                    <label>
                        <input type="checkbox" class="checkbox" checked disabled>
                        Ingat saya
                    </label>

                    <!-- <a href="#">Lupa password?</a> -->
                </div>

                <button class="login-Btn" type="submit">
                    Masuk
                </button>
            </form>

        </div>
    </div>
    <script src="../js/login.js"></script>
</body>

</html>
